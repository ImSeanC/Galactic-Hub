<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Explorer - Galactic Hub Docs</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="frame">
    <aside class="sidebar">
      <div class="branding">
        <strong>Galactic Hub</strong>
        <p>Static docs explorer</p>
      </div>
      <div class="search-container">
        <label for="site-search">Search docs</label>
        <input id="site-search" type="search" placeholder="Search by title or content">
      </div>
      <nav class="tree" id="file-tree" aria-label="Document tree"></nav>
    </aside>
    <main class="content">
      <header class="page-header">
        <h1>Documentation Explorer</h1>
        <p class="page-meta">Generated from repository Markdown sources.</p>
      </header>
      <article class="doc-content">
        
    <section class="home-intro">
      <p>Welcome to the autogenerated Galactic Hub documentation explorer. Use the search box or the file tree to open Markdown pages.</p>
      <div class="home-summary">
        <strong>1</strong> Markdown files discovered across the repository.
      </div>
    </section>
  
      </article>
    </main>
  </div>
  <script>window.SITE_DATA = {"tree":[{"name":"README.md","type":"file","sourcePath":"README.md","htmlPath":"README.html","title":"Galactic-Hub","excerpt":"Galactic Hub This repository now includes a static documentation explorer generator. Build the docs site 1. Install dependencies: 2. Build the static site: T..."}],"docs":[{"name":"README.md","type":"file","sourcePath":"README.md","htmlPath":"README.html","title":"Galactic-Hub","excerpt":"Galactic Hub This repository now includes a static documentation explorer generator. Build the docs site 1. Install dependencies: 2. Build the static site: T..."}]}; window.CURRENT_HTML_PATH = "index.html"; window.ROOT_PREFIX = "";</script>
  <script type="module" src="assets/app.js"></script>

</html>
